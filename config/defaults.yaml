##############################################################################
# Global defaults — shared across ALL sites
# Values here can be overridden in config/sites/<site>.yaml
##############################################################################

# --- IP allocation offsets from the subnet network address -------------------
# No VIPs — DNS round-robin across all nodes in each role:
#   api/api-int  → all control plane IPs
#   *.apps       → all infra IPs
#
# NOTE: AWS reserves the first four addresses (.0-.3) and the last (.255 in a
# /24) of every subnet, so offsets start at .10 to stay clear of them.
#   .10-.12  = infra nodes       (ingress)
#   .20-.22  = control plane     (API)
#   .30      = bootstrap
#   .40+     = compute nodes     (optional, empty by default)
infra_ip_offsets: [10, 11, 12]
control_plane_ip_offsets: [20, 21, 22]
bootstrap_ip_offset: 30
compute_ip_offsets: []           # empty = no compute nodes; e.g. [40, 41, 42] to add 3

# --- Node sizing (EC2 instance types) ----------------------------------------
control_plane_instance_type: m5.2xlarge   # 8 vCPU / 32 GiB
control_plane_disk_size: 120              # GB

infra_instance_type: m5.2xlarge           # 8 vCPU / 32 GiB
infra_disk_size: 120                      # GB

compute_instance_type: m5.xlarge          # 4 vCPU / 16 GiB
compute_disk_size: 120                    # GB

bootstrap_instance_type: m5.large         # 2 vCPU / 8 GiB
bootstrap_disk_size: 120                  # GB

# --- OpenShift cluster networking --------------------------------------------
# Override in the site profile if your environment uses different ranges.
cluster_network_cidr: 10.132.0.0/14
cluster_network_host_prefix: 23
service_network_cidr: 172.31.0.0/16

# --- Credentials and certificates -------------------------------------------
# Drop files in config/ — no site profile change needed unless paths differ.
#   pull_secret_path: config/pull-secret.json     (real Red Hat pull secret)
#   ssh_public_key_path: ~/.ssh/id_rsa.pub
# AWS credentials come from the environment: AWS_ACCESS_KEY_ID /
# AWS_SECRET_ACCESS_KEY, or AWS_PROFILE.

# --- Tool paths --------------------------------------------------------------
openshift_install_bin: /usr/local/bin/openshift-install-4.20
terraform_bin: /usr/local/bin/terraform
# terraform_dir defaults to the aws/ folder inside the cloned repo (auto-resolved).
# Terraform providers are pre-downloaded into aws/providers/ and committed, so
# `terraform init` uses the local filesystem mirror instead of the registry.
# Relative paths resolve against terraform_dir (aws/) → aws/providers/.
terraform_plugin_dir: ./providers

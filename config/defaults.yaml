##############################################################################
# Global defaults — shared across ALL sites
# Values here can be overridden in config/sites/<site>.yaml
##############################################################################

# --- IP allocation offsets from the network address -------------------------
# No VIPs — DNS round-robin across all nodes in each role:
#   api/api-int  → all control plane IPs  (Terraform exec provisioner)
#   *.apps       → all infra IPs           (Python API call)
#
# Default layout:
#   .1-.3  = infra nodes       (ingress)
#   .4-.6  = control plane     (API)
#   .7     = bootstrap
#   .8+    = compute nodes     (optional, empty by default)
#   .254   = gateway
gateway_offset: 254
infra_ip_offsets: [1, 2, 3]
control_plane_ip_offsets: [4, 5, 6]
bootstrap_ip_offset: 7
compute_ip_offsets: []           # empty = no compute nodes; e.g. [8, 9, 10] to add 3

# --- VM defaults -------------------------------------------------------------
guest_id: coreos64Guest

# --- Node sizing -------------------------------------------------------------
control_plane_num_cpus: 8
control_plane_memory: 24576      # MB
control_plane_disk_size: 120     # GB

infra_num_cpus: 8
infra_memory: 32768              # MB
infra_disk_size: 120             # GB

compute_num_cpus: 4
compute_memory: 8192             # MB
compute_disk_size: 120           # GB

bootstrap_disk_size: 100         # GB

# --- OpenShift cluster networking --------------------------------------------
# Override in the site profile if your environment uses different ranges.
cluster_network_cidr: 10.132.0.0/14
cluster_network_host_prefix: 23
service_network_cidr: 172.31.0.0/16

# --- Mirror registry ---------------------------------------------------------
# One entry per source registry. Override per site/cluster if mirrors differ.
image_mirrors:
  - source: quay.io/openshift-release-dev/ocp-release
    mirror: mirror.registry.example.local:5000/openshift/release
  - source: quay.io/openshift-release-dev/ocp-v4.0-art-dev
    mirror: mirror.registry.example.local:5000/openshift/release
  - source: registry.redhat.io
    mirror: mirror.registry.example.local:5000

# --- Credentials and certificates -------------------------------------------
# Drop files in config/ — no site profile change needed unless paths differ.
#   pull_secret_path: config/pull-secret.json
#   additional_trust_bundle_path: config/additional-trust-bundle.pem
#   ssh_public_key_path: ~/.ssh/id_rsa.pub

# --- Tool paths --------------------------------------------------------------
openshift_install_bin: /usr/local/bin/openshift-install-4.20
terraform_bin: /usr/local/bin/terraform
# terraform_dir defaults to the vsphere/ folder inside the cloned repo (auto-resolved).
# Override here only if you keep the Terraform code somewhere else.
# terraform_dir: /opt/ocp-terraform
# Local provider mirror for disconnected environments.
# Relative paths are resolved against terraform_dir (default: vsphere/ in this repo).
# ./providers resolves to vsphere/providers/ which is committed to the repo —
# no internet access needed after cloning.
terraform_plugin_dir: ./providers

# --- vSphere tag guard -------------------------------------------------------
# If set, terraform will abort if vsphere_cluster lacks this tag.
# Leave empty to skip the check.
vsphere_required_tag_category: ""
vsphere_required_tag_name: ""

# --- APIs --------------------------------------------------------------------
# Wildcard DNS API (*.apps records; api/api-int handled by Terraform exec provisioner)
wildcard_dns_api_url: http://dns-api.example.local:8080/api/wildcard

# VLAN Manager — omit vlan_manager_url in the cluster config to use it for auto-allocation
vlan_manager_url: http://vlan-manager.example.local:8000
vlan_manager_vrf: default
